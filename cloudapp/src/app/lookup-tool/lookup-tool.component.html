


<ng-container *ngIf="config; else error_msg">
 <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px;">
  <button mat-flat-button type="button" color="primary" [routerLink]="['/settings']">
    Settings
  </button>

  <button mat-flat-button type="button" color="primary" (click)="handleUpload()" [disabled]="files.length==0 || loading">
    {{ 'Main.SearchItems' | translate }}
  </button>
</div>

</ng-container>

<ng-template #error_msg>
  <h1>This app needs to be configured first</h1>
</ng-template>

   <!--similar styling to other cloud apps-->
   <h1 >{{ 'Main.LookupTool' | translate }}</h1>
  
 <div>
  <a href="./assets/example input.xlsx">Download lookup tool input template</a>
 </div>
 <br />
  <div>

    
  
      
    
  <ngx-dropzone (change)="onSelect($event)" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" [multiple]=false>
    <ngx-dropzone-label translate>Main.DragFile</ngx-dropzone-label>
    <ngx-dropzone-preview *ngFor="let f of files" [removable]="true" (removed)="onRemove(f)">
      <ngx-dropzone-label>{{ f.name }}</ngx-dropzone-label>
    </ngx-dropzone-preview>
  </ngx-dropzone>
  </div>
  <br/>
  <div>
    <button mat-flat-button type="button" color="primary" [routerLink]="['/main']">Citation Loader</button>
    <!--<a [routerLink]="['main']">To Citation Loader</a>-->
  </div>
 
  
  <div class="loading-shade" *ngIf="loading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>
